name: Deploy Cricket Trading System

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      mode:
        description: 'Deployment mode'
        required: true
        default: 'demo'
        type: choice
        options:
          - demo
          - live

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── Lint & Test ────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests
        run: |
          cd tests && python -m pytest -v --tb=short --cov=../backend --cov-report=xml || true
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          REDIS_URL: redis://localhost:6379/0
          DEMO_MODE: "true"

      - name: Validate ML model
        run: |
          python -c "
          from backend.ml_model.predictor import CricketMLModel
          from backend.ml_model.ensemble_predictor import EnsemblePredictor
          model = CricketMLModel()
          ens = EnsemblePredictor()
          state = {
              'innings': 2, 'overs': 12.0, 'total_runs': 95,
              'total_wickets': 3, 'run_rate': 7.92,
              'required_run_rate': 8.75, 'target': 170
          }
          pred = ens.predict(state)
          print(f'Ensemble prediction: {pred.win_probability}')
          print(f'Action: {pred.recommended_action}')
          print(f'Confidence: {pred.confidence}')
          assert 0 < pred.win_probability < 1, 'Invalid probability'
          print('✅ ML model validation passed')
          "

  # ─── Build Docker Image ────────────────────────────────────────────────────
  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Build & Deploy Frontend to GitHub Pages ───────────────────────────────
  deploy-pages:
    needs: test
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'
    
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          REACT_APP_API_URL: ${{ vars.API_URL || 'https://api.cricket-trading.example.com' }}
          REACT_APP_WS_URL: ${{ vars.WS_URL || 'wss://ws.cricket-trading.example.com' }}
          REACT_APP_DEMO_MODE: 'true'

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ─── Notify ────────────────────────────────────────────────────────────────
  notify:
    needs: [test, build, deploy-pages]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Notify Telegram on success
        if: needs.test.result == 'success'
        run: |
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_ALERT_CHAT_ID }}" \
            -d text="✅ Cricket Trading System deployed successfully! Dashboard: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/ Commit: ${{ github.sha }}" \
            -d parse_mode="HTML" || true

      - name: Notify Telegram on failure
        if: needs.test.result == 'failure'
        run: |
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_ALERT_CHAT_ID }}" \
            -d text="❌ Cricket Trading System build failed! Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -d parse_mode="HTML" || true