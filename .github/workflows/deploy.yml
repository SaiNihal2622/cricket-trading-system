name: Deploy Cricket Trading System

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      mode:
        description: 'Deployment mode'
        required: true
        default: 'demo'
        type: choice
        options:
          - demo
          - live

jobs:
  # ─── Test ────────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov
        continue-on-error: true

      - name: Validate imports and models
        run: |
          python -c "
          import asyncio
          from config import TEAMS, VENUE_PATTERNS
          from statistical_model import statistical_match_winner, combined_prediction
          from ai_ensemble import get_ensemble_prediction
          from trade_resolver import resolve_demo_trades

          # Test statistical model
          stat = statistical_match_winner('Delhi Capitals', 'Kolkata Knight Riders', 1.75, 2.10, 'Arun Jaitley Stadium')
          assert 0 < stat['statistical_prob'] < 1, 'Invalid probability'
          print(f'Stats model: {stat[\"statistical_prob\"]:.3f} (edge: {stat[\"edge\"]:.3f})')

          # Test combined prediction
          combined = combined_prediction(None, stat)
          print(f'Combined: {combined[\"ensemble_prob\"]:.3f} (trade: {combined[\"should_trade\"]})')

          print('✅ All imports and models validated')
          "
        continue-on-error: true

  # ─── Build & Deploy Frontend to GitHub Pages ───────────────────────────────
  deploy-pages:
    needs: test
    runs-on: ubuntu-latest
    if: always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'
    
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          REACT_APP_API_URL: ${{ vars.API_URL || 'https://api.cricket-trading.example.com' }}
          REACT_APP_WS_URL: ${{ vars.WS_URL || 'wss://ws.cricket-trading.example.com' }}
          REACT_APP_DEMO_MODE: 'true'

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/build
          publish_branch: gh-pages
          force_orphan: true

  # ─── Notify ────────────────────────────────────────────────────────────────
  notify:
    needs: [test, deploy-pages]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Notify Telegram on success
        if: needs.deploy-pages.result == 'success'
        run: |
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_ALERT_CHAT_ID }}" \
            -d text="✅ Cricket Trading System deployed successfully! Dashboard: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/ Commit: ${{ github.sha }}" \
            -d parse_mode="HTML" || true

      - name: Notify Telegram on failure
        if: needs.deploy-pages.result == 'failure'
        run: |
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_ALERT_CHAT_ID }}" \
            -d text="❌ Cricket Trading System build failed! Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -d parse_mode="HTML" || true