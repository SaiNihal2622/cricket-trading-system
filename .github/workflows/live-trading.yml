name: Live Cricket Trading

on:
  # Auto-trigger at 7:00 PM IST (1:30 PM UTC) on match days
  schedule:
    - cron: '30 13 * * 3,4,5,6,7'  # Wed-Sun (typical IPL match days)
    - cron: '30 13 * * 0,1'        # Mon-Tun (some double headers)
  
  # Manual trigger with custom parameters
  workflow_dispatch:
    inputs:
      mode:
        description: 'Trading mode'
        required: true
        default: 'demo'
        type: choice
        options:
          - demo
          - live
      duration_hours:
        description: 'How long to run (hours)'
        required: true
        default: '4'
        type: string
      scan_interval:
        description: 'Scan interval in seconds'
        required: true
        default: '120'
        type: string

env:
  TRADING_MODE: ${{ github.event.inputs.mode || 'demo' }}
  DURATION_HOURS: ${{ github.event.inputs.duration_hours || '4' }}
  SCAN_INTERVAL: ${{ github.event.inputs.scan_interval || '120' }}

jobs:
  # ─── Live Trading Engine ─────────────────────────────────────────────────────
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 300  # 5 hours max
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Initialize database
        run: python -c "import db; db.init_db(); print('DB initialized')"

      - name: Run live trading engine
        run: python cloud_runner.py
        env:
          TRADING_MODE: ${{ env.TRADING_MODE }}
          DURATION_HOURS: ${{ env.DURATION_HOURS }}
          SCAN_INTERVAL: ${{ env.SCAN_INTERVAL }}
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CLOUDBET_API_KEY: ${{ secrets.CLOUDBET_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
          DB_PATH: cricket_trading.db

      - name: Upload trading results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trading-results-${{ github.run_number }}
          path: |
            cricket_trading.db
            trading_log_*.txt
          retention-days: 30

      - name: Send summary to Telegram
        if: always()
        run: |
          python -c "
          import asyncio, json, os
          from datetime import datetime
          
          # Read final stats from DB
          try:
              import db
              stats = db.get_session_stats()
              mode = '${{ env.TRADING_MODE }}'
              msg = f'''
🏏 <b>Trading Session Complete</b>
📅 {datetime.now().strftime('%Y-%m-%d %H:%M')}
🎮 Mode: {mode.upper()}
📊 Trades: {stats.get('total_trades', 0)}
✅ Won: {stats.get('won', 0)}
❌ Lost: {stats.get('lost', 0)}
💰 P&L: {stats.get('pnl', 0):.2f}
📈 Accuracy: {stats.get('accuracy', 0):.1%}
🤖 Models: MIMO + Gemini + Grok + NVIDIA
              '''
          except:
              msg = '🏏 Trading session completed. Check artifacts for details.'
          
          # Send via Telegram
          import httpx
          token = os.getenv('TELEGRAM_BOT_TOKEN', '')
          chat_id = os.getenv('TELEGRAM_CHAT_ID', '')
          if token and chat_id:
              asyncio.run(httpx.AsyncClient().post(
                  f'https://api.telegram.org/bot{token}/sendMessage',
                  json={'chat_id': chat_id, 'text': msg, 'parse_mode': 'HTML'}
              ))
              print('Telegram notification sent')
          else:
              print('No Telegram config, skipping notification')
          " || echo "Notification skipped"

  # ─── Quick Demo Test ────────────────────────────────────────────────────────
  demo-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run demo test
        run: |
          python -c "
          import asyncio
          from config import MIMO_API_KEY, GEMINI_API_KEY, GROK_API_KEY
          from ai_ensemble import get_ensemble_prediction
          
          async def test():
              result = await get_ensemble_prediction(
                  match_name='DC v KKR',
                  home_team='Delhi Capitals',
                  away_team='Kolkata Knight Riders',
                  venue='Arun Jaitley Stadium',
                  market_type='match_winner',
                  selection='Delhi Capitals',
                  odds=1.85,
                  venue_stats={'avg_1st': 170, 'powerplay': 52, 'death': 48, 'spin_friendly': False},
                  team_stats={'home_avg': 168, 'away_avg': 175, 'h2h': 'DC 12-15 KKR (27 matches)'}
              )
              print(f'Ensemble probability: {result[\"ensemble_prob\"]}')
              print(f'Consensus: {result[\"consensus_score\"]}')
              print(f'Models agreed: {result[\"models_agreed\"]}/{result[\"models_total\"]}')
              print(f'Edge: {result.get(\"edge\", 0):.1%}')
              
              # Check which models responded
              for pred in result.get('predictions', []):
                  print(f'  {pred[\"model_name\"]}: {pred[\"predicted_prob\"]:.1%} (conf: {pred[\"confidence\"]:.1%})')
              
              assert result['models_total'] >= 1, 'At least 1 model must respond'
              print('✅ Demo test passed!')
          
          asyncio.run(test())
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}