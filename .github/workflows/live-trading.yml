name: Live Cricket Trading

on:
  schedule:
    - cron: '30 13 * * 3,4,5,6,7'
    - cron: '30 13 * * 0,1'

  workflow_dispatch:
    inputs:
      mode:
        description: 'Trading mode'
        required: true
        default: 'demo'
        type: choice
        options:
          - demo
          - live
      duration_hours:
        description: 'How long to run (hours)'
        required: true
        default: '4'
        type: string
      scan_interval:
        description: 'Scan interval in seconds'
        required: true
        default: '120'
        type: string

env:
  TRADING_MODE: ${{ github.event.inputs.mode || 'demo' }}
  DURATION_HOURS: ${{ github.event.inputs.duration_hours || '4' }}
  SCAN_INTERVAL: ${{ github.event.inputs.scan_interval || '120' }}

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Initialize database
        run: python -c "import db; db.init_db(); print('DB initialized')"

      - name: Run live trading engine
        run: python cloud_runner.py
        env:
          TRADING_MODE: ${{ env.TRADING_MODE }}
          DURATION_HOURS: ${{ env.DURATION_HOURS }}
          SCAN_INTERVAL: ${{ env.SCAN_INTERVAL }}
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CLOUDBET_API_KEY: ${{ secrets.CLOUDBET_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
          DB_PATH: cricket_trading.db

      - name: Upload trading results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trading-results-${{ github.run_number }}
          path: |
            cricket_trading.db
            trading_log_*.json
          retention-days: 30

      - name: Send summary to Telegram
        if: always()
        run: |
          python -c "
          import asyncio, os, httpx
          from datetime import datetime
          from db import get_session_stats
          try:
              stats = get_session_stats()
              mode = os.environ.get('TRADING_MODE', 'demo')
              msg = 'CRICKET TRADING SESSION COMPLETE\n'
              msg += 'Date: ' + datetime.now().strftime('%Y-%m-%d %H:%M') + '\n'
              msg += 'Mode: ' + mode.upper() + '\n'
              msg += 'Trades: ' + str(stats.get('total_trades', 0)) + '\n'
              msg += 'Won: ' + str(stats.get('won', 0)) + '\n'
              msg += 'Lost: ' + str(stats.get('lost', 0)) + '\n'
              msg += 'P&L: ' + str(round(stats.get('pnl', 0), 2)) + '\n'
              msg += 'Accuracy: ' + str(round(stats.get('accuracy', 0) * 100, 1)) + '%\n'
              msg += 'Models: MIMO + Gemini + Grok + NVIDIA'
          except Exception as e:
              msg = 'Trading session completed. Check artifacts for details. Error: ' + str(e)
          token = os.getenv('TELEGRAM_BOT_TOKEN', '')
          chat_id = os.getenv('TELEGRAM_CHAT_ID', '')
          if token and chat_id:
              asyncio.run(httpx.AsyncClient().post(
                  'https://api.telegram.org/bot' + token + '/sendMessage',
                  json={'chat_id': chat_id, 'text': msg}
              ))
              print('Telegram notification sent')
          else:
              print('No Telegram config, skipping')
          "
        env:
          TRADING_MODE: ${{ env.TRADING_MODE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}

  demo-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run demo test
        run: |
          python -c "
          import asyncio
          from config import MIMO_API_KEY, GEMINI_API_KEY, GROK_API_KEY
          from ai_ensemble import get_ensemble_prediction

          async def test():
              result = await get_ensemble_prediction(
                  match_name='DC v KKR',
                  home_team='Delhi Capitals',
                  away_team='Kolkata Knight Riders',
                  venue='Arun Jaitley Stadium',
                  market_type='match_winner',
                  selection='Delhi Capitals',
                  odds=1.85,
                  venue_stats={'avg_1st': 170, 'powerplay': 52, 'death': 48, 'spin_friendly': False},
                  team_stats={'home_avg': 168, 'away_avg': 175, 'h2h': 'DC 12-15 KKR (27 matches)'}
              )
              print('Ensemble probability:', result['ensemble_prob'])
              print('Consensus:', result['consensus_score'])
              print('Models agreed:', result['models_agreed'], '/', result['models_total'])
              print('Edge:', result.get('edge', 0))
              for pred in result.get('predictions', []):
                  print('  ', pred['model_name'], ':', pred['predicted_prob'], '(conf:', pred['confidence'], ')')
              assert result['models_total'] >= 1, 'At least 1 model must respond'
              print('Demo test passed!')

          asyncio.run(test())
          "
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}